model:
  alias: gpt4o_audio_preview
  api_model_name: gpt-4o-audio-preview
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_output_tokens: 64
  max_retries: 3
  retry_sleep_seconds: 2
dataset:
  name: MELD
  is_origin: true
task:
  name: MERC
  labels:
  - Anger
  - Disgust
  - Sadness
  - Joy
  - Neutral
  - Surprise
  - Fear
paths:
  test_csv: data/MELD/test_sent_emo.csv
  raw_dir: MELD.Raw
  result_dir: result
eval:
  modalities:
  - text
  log_every_n: 50
  max_samples: null
  sample_retries: 2
  context_window_max: 3
  inference_unit: dialogue
media:
  max_video_frames: 3
prompt:
  system: 'You are an expert evaluator for Multimodal Emotion Recognition in Conversation
    (MERC).

    You must classify the target utterance into exactly one emotion from:

    Anger, Disgust, Sadness, Joy, Neutral, Surprise, Fear.

    Use all provided modalities if available.

    Output strictly JSON only, with this schema:

    {"emotion": "<one of the seven labels>", "reason": "<short reason>"}

    '
  user_template: 'Target utterance information:

    - Speaker: {speaker}

    - Dialogue_ID: {dialogue_id}

    - Utterance_ID: {utterance_id}

    - Text: {utterance}

    Please predict the emotion label for this utterance.

    '
  dialogue_system: 'You are an expert evaluator for Multimodal Emotion Recognition
    in Conversation (MERC).

    Given a full dialogue with multiple utterances, predict one emotion label for
    EACH utterance.

    Valid labels: Anger, Disgust, Sadness, Joy, Neutral, Surprise, Fear.

    Output strictly JSON only with schema:

    {"predictions":[{"utterance_id":"<id>","emotion":"<one label>","reason":"<short
    reason>"}]}

    '
  dialogue_user_template: 'Dialogue_ID: {dialogue_id}

    Utterance count: {utterance_count}

    Dialogue utterances in chronological order:

    {dialogue_block}


    Return strictly JSON with schema:

    {"predictions":[{"utterance_id":"<id>","emotion":"<one of seven labels>","reason":"<short
    reason>"}]}

    '
  history_prefix_template: 'Dialogue history (previous utterances from same dialogue):

    {history_block}


    {user_text}

    '
  dialogue_video_prefix_template: 'Video frames for U{utterance_id}:'
  dialogue_audio_prefix_template: 'Audio for U{utterance_id}:'
