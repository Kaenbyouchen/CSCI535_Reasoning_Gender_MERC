dataset:
  name: MELD
model:
  type: qwen
  alias: qwen25_omni7b_reason
  hf_model_name: Qwen/Qwen2.5-Omni-7B
  hf_token_env: HF_TOKEN
  torch_dtype: bf16
  device_map: auto
  attn_implementation: sdpa
  low_cpu_mem_usage: true
  cache_dir: null
  temperature: 0.0
  max_cot_output_tokens: 1024
  max_retries: 2
  retry_sleep_seconds: 2
  use_audio_in_video: false
  disable_talker: true
  return_audio: false
task:
  name: MERC_REASON
  labels:
  - Anger
  - Disgust
  - Sadness
  - Joy
  - Neutral
  - Surprise
  - Fear
paths:
  test_csv: data/MELD/test_sent_emo.csv
  raw_dir: MELD.Raw
  cf_metadata_csv: data/counterfactual/metadata_counterfactual.csv
  result_dir: result
  predictions_bl_csv: None
  predictions_cf_csv: None
subsample:
  n_samples: 100
  random_seed: 42
  stratify_emotion_gender: true
  audio_source: counterfactual
  min_flips_in_batch: 15
eval:
  modalities:
  - text
  - audio
  - video
  speaker_mode: anon
  log_every_n: 5
  single_sample_timeout_s: 900
  video_fps: 1.0
  video_max_pixels: 100352
  video_max_frames: 16
