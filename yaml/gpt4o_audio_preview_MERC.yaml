model:
  alias: gpt4o_audio_preview
  api_model_name: gpt-4o-audio-preview
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_output_tokens: 1024
  max_retries: 3
  retry_sleep_seconds: 2

dataset:
  name: MELD
  is_origin: true

task:
  name: MERC
  labels: [Anger, Disgust, Sadness, Joy, Neutral, Surprise, Fear]

paths:
  test_csv: data/MELD/test_sent_emo.csv
  raw_dir: MELD.Raw
  result_dir: result

eval:
  # audio-preview 版本默认走 text+audio
  modalities: [audio]
  # 视频采样率（每秒采样多少帧）
  frame_sample_fps: 1.0
  # name: 原始姓名; anon: 匿名为P1/P2但保留同一说话人连续性; none: 不提供身份
  speaker_mode: anon
  log_every_n: 50
  max_samples: null
  sample_retries: 2
  # 0 表示不使用历史上下文；3/5/10 是常见可选值。
  context_window_max: 3
  # utterance: 逐句预测（可配固定窗口上下文）；dialogue: 一次输入整段对话并输出每句标签。
  inference_unit: dialogue

prompt:
  utterance:
    system: |
      You are an expert evaluator for Multimodal Emotion Recognition in Conversation (MERC).
      You must classify the target utterance into exactly one emotion from:
      Anger, Disgust, Sadness, Joy, Neutral, Surprise, Fear.
      Use all provided modalities if available.
      Output strictly JSON only, with this schema:
      {"emotion": "<one of the seven labels>"}
    user_template: |
      Target utterance information:
      - Speaker: {speaker}
      - Dialogue_ID: {dialogue_id}
      - Utterance_ID: {utterance_id}
      - Text: {utterance}
      Please predict the emotion label for this utterance.
    history_prefix_template: |
      Dialogue history (previous utterances from same dialogue):
      {history_block}

      {user_text}
  dialogue:
    system: |
      You are an expert evaluator for Multimodal Emotion Recognition in Conversation (MERC).
      Given a full dialogue with multiple utterances, predict one emotion label for EACH utterance.
      Each utterance includes a speaker identifier; use speaker identity and turn-taking context.
      Valid labels: Anger, Disgust, Sadness, Joy, Neutral, Surprise, Fear.
      Do not include markdown code fences.
      Output strictly JSON only with schema:
      {"predictions":[{"utterance_id":"<id>","emotion":"<one label>"}]}
    user_template: |
      Dialogue_ID: {dialogue_id}
      Utterance count: {utterance_count}
      Dialogue utterances in chronological order:
      {dialogue_block}
      Note: each line is formatted as [Uid] Speaker=<id>: <text> (e.g., Speaker=P1).

      Return strictly JSON with schema:
      {"predictions":[{"utterance_id":"<id>","emotion":"<one of seven labels>"}]}
    video_prefix_template: "Video frames for U{utterance_id}:"
    audio_prefix_template: "Audio for U{utterance_id}:"
