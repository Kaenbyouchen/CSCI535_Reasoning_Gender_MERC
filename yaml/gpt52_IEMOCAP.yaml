model:
  type: openai
  alias: gpt52
  api_model_name: gpt-5.2
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_output_tokens: 1024
  max_retries: 3
  retry_sleep_seconds: 2

dataset:
  name: IEMOCAP
  data_dir: data/IEMOCAP_full_release
  filter_other: true  # 过滤 xxx/Other 标签

task:
  name: MERC
  labels: [Neutral, Anger, Frustration, Happiness, Excited, Sadness, Fear, Disgust, Surprise]

paths:
  result_dir: result

eval:
  # 可选: [text], [text, audio], [text, video], [text, audio, video]
  modalities: [text, audio, video]
  frame_sample_fps: 1.0
  # name: 原始speaker名; anon: 匿名P1/P2; none: Unknown
  speaker_mode: anon
  log_every_n: 10
  max_samples: null
  sample_retries: 2

prompt:
  dialogue:
    system: |
      You are an expert evaluator for Multimodal Emotion Recognition in Conversation (MERC).
      Given a full dialogue with multiple utterances, predict one emotion label for EACH utterance.
      Valid labels: Neutral, Anger, Frustration, Happiness, Excited, Sadness, Fear, Disgust, Surprise.
      Output strictly JSON only with schema:
      {"predictions":[{"utterance_id":"<id>","emotion":"<one label>"}]}
    user_template: |
      Dialogue_ID: {dialogue_id}
      Utterance count: {utterance_count}
      Dialogue utterances in chronological order:
      {dialogue_block}
      Note: each line is formatted as [Uid] Speaker=<label>: <text>.

      Return strictly JSON with schema:
      {"predictions":[{"utterance_id":"<id>","emotion":"<one of the nine labels>"}]}
    audio_prefix_template: "Dialogue audio:"
    video_prefix_template: "Dialogue video frames:"
