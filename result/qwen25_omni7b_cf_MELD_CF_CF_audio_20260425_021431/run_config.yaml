model:
  type: qwen
  alias: qwen25_omni7b_cf
  hf_model_name: Qwen/Qwen2.5-Omni-7B
  hf_token_env: HF_TOKEN
  torch_dtype: bf16
  device_map: auto
  attn_implementation: sdpa
  low_cpu_mem_usage: true
  cache_dir: null
  temperature: 0.0
  max_output_tokens: 64
  max_retries: 2
  retry_sleep_seconds: 2
  use_audio_in_video: false
  disable_talker: true
  return_audio: false
task:
  name: MERC_CF
  labels:
  - Anger
  - Disgust
  - Sadness
  - Joy
  - Neutral
  - Surprise
  - Fear
paths:
  test_csv: data/MELD/test_sent_emo.csv
  raw_dir: MELD.Raw
  cf_metadata_csv: data/counterfactual/metadata_counterfactual.csv
  result_dir: result
eval:
  modalities:
  - audio
  speaker_mode: anon
  log_every_n: 50
  max_samples: null
  sample_retries: 2
  sample_timeout_seconds: 600
  context_window_max: 0
  inference_unit: utterance
  audio_source: counterfactual
  save_logits: true
  n_samples_filtered: 2156
