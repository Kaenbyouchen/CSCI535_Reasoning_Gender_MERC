model:
  type: qwen
  alias: qwen25_omni7b
  hf_model_name: Qwen/Qwen2.5-Omni-7B
  hf_token_env: HF_TOKEN
  torch_dtype: bf16
  device_map: auto
  attn_implementation: flash_attention_2
  low_cpu_mem_usage: true
  cache_dir: null
  temperature: 0.0
  max_output_tokens: 32
  max_retries: 2
  retry_sleep_seconds: 2
  use_audio_in_video: false
  disable_talker: true
  return_audio: false
dataset:
  name: IEMOCAP
  data_dir: data/IEMOCAP_full_release
  filter_other: true
task:
  name: MERC
  labels:
  - Neutral
  - Anger
  - Frustration
  - Happiness
  - Excited
  - Sadness
  - Fear
  - Disgust
  - Surprise
paths:
  result_dir: result
eval:
  modalities:
  - text
  - audio
  - video
  frame_sample_fps: 1.0
  speaker_mode: anon
  log_every_n: 100
  context_window: 5
  max_samples: null
  sample_retries: 2
  sample_timeout_seconds: 600
  stall_log_seconds: 180
prompt:
  utterance:
    system: 'You are an expert at Multimodal Emotion Recognition in Conversation (MERC).

      Given conversation context and a TARGET utterance, predict the emotion of the
      TARGET utterance.

      Valid labels: Neutral, Anger, Frustration, Happiness, Excited, Sadness, Fear,
      Disgust, Surprise.

      Output ONLY the emotion label, nothing else. No explanation, no punctuation.

      '
    user_template: '{context_block}TARGET utterance - Speaker={target_speaker}: {target_text}


      Emotion of TARGET utterance (one of: Neutral, Anger, Frustration, Happiness,
      Excited, Sadness, Fear, Disgust, Surprise):

      '
    audio_prefix_template: 'Audio of TARGET utterance:'
    video_prefix_template: 'Video of TARGET utterance:'
